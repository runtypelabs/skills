name: Skill Lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Lint skill content
        run: node scripts/lint-skills.mjs
      - name: Smoke test standalone skill installs
        run: node scripts/smoke-install-skills.mjs
